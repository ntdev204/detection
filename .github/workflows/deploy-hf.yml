name: Deploy FastAPI to HuggingFace Space

on:
  push:
    branches:
      - main
    paths:
      - "server/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Deploy to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

          # Clone Space
          git clone https://ntdev204:${HF_TOKEN}@huggingface.co/spaces/ntdev204/detection hf-space

          # Sync server folder to Space root
          rsync -av --delete server/ hf-space/

          cd hf-space
          git add .

          # Commit only if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "Auto deploy from GitHub"
            git push
          else
            echo "No changes to deploy"
          fi
